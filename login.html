<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin DAVID SHOP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --primary:#ff6b35; --dark:#111827; --muted:#6b7280; --border:#f3e4d7; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:'Poppins',sans-serif; background:#fffaf7; color:var(--dark); display:grid; place-items:center; min-height:100vh; padding:20px; }
    .card { width:100%; max-width:420px; background:white; border:1px solid var(--border); border-radius:24px; padding:24px; box-shadow:0 12px 30px rgba(17,24,39,0.06); }
    h1 { margin:0 0 8px; font-size:1.5rem; }
    p { margin:0 0 16px; color:var(--muted); }
    form { display:flex; flex-direction:column; gap:12px; }
    input { width:100%; border:1px solid var(--border); border-radius:10px; padding:12px 14px; font-family:inherit; }
    button { border:0; background:var(--primary); color:white; padding:12px 14px; border-radius:10px; font-weight:700; cursor:pointer; }
    .note { margin-top:12px; color:var(--muted); font-size:0.95rem; }
    .error { color:#dc2626; margin-top:10px; font-weight:600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login Admin</h1>
    <p>Masuk untuk mengelola produk DAVID SHOP.</p>
    <form id="login-form">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Masuk</button>
    </form>
    <div class="error" id="error-text"></div>
    <div class="note">Default: username <strong>admin</strong>, password <strong>123456</strong></div>
  </div>

  <script>
    const loginForm = document.getElementById('login-form');
    const errorText = document.getElementById('error-text');

    loginForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (username === 'admin' && password === '123456') {
        localStorage.setItem('davidAdminLoggedIn', 'true');
        window.location.href = 'admin.html';
      } else {
        errorText.textContent = 'Username atau password salah.';
      }
    });
  </script>
</body>
</html>
